<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>সার্ভার সমস্যা — সহায়.bd</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Hind Siliguri', sans-serif;
      background: #f9fafb;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
    }
    .icon { font-size: 4.5rem; margin-bottom: .5rem; }
    h1 { font-size: 1.9rem; font-weight: 800; margin-bottom: .6rem; }
    p { color: #6b7280; max-width: 420px; margin: 0 auto 1.75rem; line-height: 1.7; }
    a {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: #15803d;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      padding: .75rem 1.75rem;
      border-radius: 999px;
    }
    a:hover { background: #16a34a; }
  </style>
</head>
<body>
  <div>
    <div class="icon">⚠️</div>
    <h1>৫০০ — সার্ভারে সমস্যা হয়েছে</h1>
    <p>দুঃখিত, আমাদের সার্ভারে একটা সমস্যা হয়েছে। আমরা এটা দেখছি, কিছুক্ষণ পর আবার চেষ্টা করুন।</p>
    <a href="/"> হোমে ফিরে যান</a>
  </div>

</html>
